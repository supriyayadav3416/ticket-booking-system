<!DOCTYPE html>
<html>
<head>
    <title>Plays</title>

    <style>
        body{
            font-family:Arial;
            text-align:center;
            background:#111;
        }

        h2{ color:white; }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            margin-top:30px;
        }

        .box{
            width:240px;
            height:160px;
            margin:15px;
            border-radius:15px;
            position:relative;
            overflow:hidden;
            box-shadow:0px 8px 20px rgba(0,0,0,0.4);
        }

        .bg{
            position:absolute;
            width:100%;
            height:100%;
            background-size:cover;
            background-position:center;
            filter:brightness(0.5);
        }

        .content{
            position:absolute;
            bottom:15px;
            left:15px;
            color:white;
            text-align:left;
        }

        .title{ font-size:18px; font-weight:bold; }

        .btn{
            display:inline-block;
            margin-top:8px;
            background:#ff3b3b;
            padding:5px 12px;
            border-radius:20px;
            color:white;
            text-decoration:none;
            font-size:12px;
        }
    </style>
</head>

<body>

<h2>🎭 Select Your Play</h2>

<div class="container">

{% for play in plays %}

<div class="box">

    <!-- SAFE: NO IF LOGIC INSIDE STYLE -->
    <div class="bg" style="background-image:url('https://images.unsplash.com/photo-1507924538820-ede94a04019d');">
    </div>

    <div class="content">
        <div class="title">{{ play[1] }}</div>
        <div>{{ play[2] }} | {{ play[3] }}</div>

        <a class="btn" href="/seats/{{ play[0] }}">
            🎟 Book
        </a>
    </div>

</div>

{% endfor %}

</div>

</body>
</html>
